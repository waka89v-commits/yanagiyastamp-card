<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>柳谷伊冴くん投票スタンプカード</title>

  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page">

    <header class="header">
      <p class="catch">4日間連続で投票してスタンプを集めよう！</p>

      <h1>
        柳谷伊冴くん<br>
        投票スタンプカード
      </h1>
    </header>

    <main class="stamp-card">

      <div id="stampArea" class="stamp-area"></div>

      <section class="action-area">

        <div class="progress-box">
          <p>現在の達成状況</p>
          <strong><span id="progressCount">0</span>/4</strong>
        </div>

        <div class="vote-box">
          <p class="vote-lead">投票で1日1回スタンプをゲット！</p>
          <button id="voteButton">投票した！</button>
          <p class="bonus-text">全て貯まると特別なアートが登場！</p>
        </div>

        <div class="link-box">
          <p>まだ投票していない？</p>
          <a href="https://produce101.jp/feature/vote" target="_blank" rel="noopener noreferrer">
            投票ページへ
          </a>
        </div>

      </section>

      <section id="artPreview" class="art-preview">
        <p class="question">?</p>
        <p>特別なアート</p>
      </section>

      <section id="completeArea" class="complete-area">
        <h2>🎉 COMPLETE 🎉</h2>
        <p>投票ありがとうございます！</p>

        <img src="images/complete.png" alt="特別なアート" onerror="this.style.display='none'">
      </section>

    </main>

    <footer>
      ※こちらはファンメイドサイトです
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
